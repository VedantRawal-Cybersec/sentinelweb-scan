<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0f172a"/>
  <rect x="50" y="50" width="1100" height="620" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="3"/>
  <text x="80" y="110" font-family="Arial" font-size="36" font-weight="700" fill="#f8fafc">Splunk Authentication Summary</text>
  <text x="80" y="155" font-family="Arial" font-size="20" fill="#94a3b8">index=failed_login_lab | stats total, failed, successful, unique IPs, unique users</text>
  <g font-family="Arial" font-size="28" fill="#e2e8f0">
    <rect x="80" y="220" width="300" height="110" rx="16" fill="#1e293b"/><text x="110" y="265">Total Events</text><text x="110" y="310" font-size="42" font-weight="700" fill="#38bdf8">195</text>
    <rect x="450" y="220" width="300" height="110" rx="16" fill="#1e293b"/><text x="480" y="265">Failed Logins</text><text x="480" y="310" font-size="42" font-weight="700" fill="#fb7185">96</text>
    <rect x="820" y="220" width="300" height="110" rx="16" fill="#1e293b"/><text x="850" y="265">Successful Logins</text><text x="850" y="310" font-size="42" font-weight="700" fill="#4ade80">99</text>
    <rect x="250" y="400" width="300" height="110" rx="16" fill="#1e293b"/><text x="280" y="445">Unique Source IPs</text><text x="280" y="490" font-size="42" font-weight="700" fill="#facc15">7</text>
    <rect x="650" y="400" width="300" height="110" rx="16" fill="#1e293b"/><text x="680" y="445">Unique Users</text><text x="680" y="490" font-size="42" font-weight="700" fill="#c084fc">20</text>
  </g>
  <text x="80" y="600" font-family="Arial" font-size="24" fill="#f8fafc">Analyst note: The dataset contains enough failed and successful authentication activity to investigate brute-force patterns.</text>
</svg>
